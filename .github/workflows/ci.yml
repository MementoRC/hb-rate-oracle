name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

# Cancel in-progress CI runs for the same ref/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    uses: Claire-s-Monster/ci-framework/.github/workflows/reusable-ci.yml@v2.7.0
    permissions:
      contents: write
      id-token: write
      pull-requests: write
      actions: read
      checks: write
    with:
      pixi-environment: "ci"
      python-versions: '["3.10", "3.11", "3.12"]'
      os-matrix: '["ubuntu-latest"]'
      enable-performance: false
      enable-hygiene-check: true
      editable-install: true
      package-path: "."
      allowed-licenses: "MIT, Apache-2.0, BSD-3-Clause, BSD-2-Clause, ISC"
    secrets: inherit

  branch-policy:
    name: "Branch Policy"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    steps:
      - name: Check source branch
        run: |
          if [ "${{ github.head_ref }}" != "development" ]; then
            echo "PRs to main must come from development branch"
            echo "  Source: ${{ github.head_ref }}"
            echo "  Expected: development"
            exit 1
          fi
          echo "PR from development to main - allowed"

  ci-success:
    name: "CI Success"
    runs-on: ubuntu-latest
    needs: [checks]
    if: always()
    steps:
      - name: Check CI status
        run: |
          if [ "${{ needs.checks.result }}" != "success" ]; then
            echo "CI failed with result: ${{ needs.checks.result }}"
            exit 1
          fi
          echo "All CI checks passed"
